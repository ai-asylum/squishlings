<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>squishlings — merge lab</title>
  <style>
    :root {
      --ink: #35284b;
      --cream: #fff6e8;
      --glass: rgba(255, 250, 240, 0.72);
      --tier-C: #8b93a3;
      --tier-UC: #57b894;
      --tier-SR: #9b5de5;
      --tier-SSR: #f0a020;
      --tier-N: #8b93a3;
      --tier-R: #4d9de0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: ui-rounded, "SF Pro Rounded", system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #ffe8d1;
      touch-action: none;
      -webkit-user-select: none; user-select: none;
      color: var(--ink);
    }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    #vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 5;
      background:
        radial-gradient(ellipse at 50% 42%, rgba(0,0,0,0) 58%, rgba(53, 40, 75, 0.16) 100%),
        linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0) 18%);
    }

    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    .title { position: absolute; top: 18px; left: 22px; line-height: 1.05; }
    .title h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
    .title p { font-size: 12px; font-weight: 600; opacity: 0.55; margin-top: 3px; letter-spacing: 0.3px; }

    .hint {
      position: absolute; bottom: 86px; left: 50%; transform: translateX(-50%);
      font-size: 12.5px; font-weight: 600; opacity: 0;
      background: var(--glass);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      padding: 7px 14px; border-radius: 999px;
      box-shadow: 0 2px 12px rgba(53,40,75,0.10);
      transition: opacity 0.6s ease;
      white-space: nowrap;
    }
    .hint.show { opacity: 0.85; }

    .bar {
      position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 6px;
      pointer-events: auto;
      background: var(--glass);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 999px; padding: 6px;
      box-shadow: 0 4px 24px rgba(53,40,75,0.16), inset 0 1px 0 rgba(255,255,255,0.7);
    }
    .bar button {
      appearance: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      height: 42px; min-width: 42px; padding: 0 14px;
      border-radius: 999px; background: transparent; color: var(--ink);
      font-family: inherit; font-size: 14px; font-weight: 700;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    .bar button:hover { background: rgba(53,40,75,0.08); }
    .bar button:active { transform: scale(0.93); }
    .bar button.primary { background: var(--ink); color: var(--cream); box-shadow: 0 3px 10px rgba(53,40,75,0.35); }
    .bar button.primary:hover { background: #463563; }
    .bar button svg { width: 17px; height: 17px; flex: none; }
    .bar .count { font-size: 14px; font-weight: 800; min-width: 34px; text-align: center; opacity: 0.75; font-variant-numeric: tabular-nums; }
    .bar .count.flash { animation: countFlash 0.4s ease; }
    @keyframes countFlash { 40% { transform: scale(1.5); color: #e0524d; } }
    .bar .divider { width: 1px; height: 22px; background: rgba(53,40,75,0.14); margin: 0 2px; }

    /* ---- hatch meter -------------------------------------------------------- */
    #spawn-bar {
      position: relative; overflow: hidden;
      width: 148px;
      background: rgba(53,40,75,0.08);
    }
    #spawn-bar .fill {
      position: absolute; left: 0; top: 0; bottom: 0; width: 0%;
      background: linear-gradient(90deg, #8fd3ae, #ffd76a);
      border-radius: 999px;
      transition: width 0.15s linear;
    }
    #spawn-bar .egg, #spawn-bar .spawn-label { position: relative; z-index: 1; }
    #spawn-bar .egg { font-size: 16px; }
    #spawn-bar.juice { animation: barJuice 0.35s cubic-bezier(0.3, 2.2, 0.4, 1); }
    @keyframes barJuice {
      35% { transform: scale(1.12, 0.85); }
      70% { transform: scale(0.96, 1.08); }
    }
    #spawn-bar.juice .fill { filter: brightness(1.4) saturate(1.3); }
    #spawn-bar.juice::after {
      content: ''; position: absolute; inset: 0; z-index: 2;
      background: linear-gradient(110deg, transparent 25%, rgba(255,255,255,0.85) 50%, transparent 75%);
      animation: shineSweep 0.4s ease;
    }
    @keyframes shineSweep { from { transform: translateX(-110%); } to { transform: translateX(110%); } }

    /* ---- rarity colors ---------------------------------------------------- */
    .tier-badge-N   { background: var(--tier-N); color: #fff; }
    .tier-badge-R   { background: var(--tier-R); color: #fff; }
    .tier-badge-SR  { background: var(--tier-SR); color: #fff; }
    .tier-badge-SSR {
      background: linear-gradient(120deg, #f6b73c, #ff8fb2, #8ad7ff, #f6b73c);
      background-size: 300% 100%; color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.25);
      animation: shimmer 2.4s linear infinite;
    }
    @keyframes shimmer { to { background-position: 300% 0; } }
    .tier-border-C  { border: 2px solid color-mix(in srgb, var(--tier-C) 45%, transparent); }
    .tier-border-UC { border: 2px solid color-mix(in srgb, var(--tier-UC) 60%, transparent); }
    .tier-border-N  { border: 2px solid color-mix(in srgb, var(--tier-N) 45%, transparent); }
    .tier-border-R  { border: 2px solid color-mix(in srgb, var(--tier-R) 60%, transparent); }
    .tier-border-SR { border: 2px solid var(--tier-SR); box-shadow: 0 0 14px rgba(155,93,229,0.35); }
    .tier-border-SSR {
      border: 2px solid transparent;
      background-clip: padding-box;
      box-shadow: 0 0 0 2.5px #f6b73c, 0 0 22px rgba(246,183,60,0.55);
    }

    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11.5px; font-weight: 700;
      padding: 3px 9px; border-radius: 999px;
      background: rgba(53,40,75,0.06);
      border: 1.5px solid rgba(53,40,75,0.14);
      position: relative;
    }
    .chip.tier-UC  { border-color: var(--tier-UC);  color: #2c7c60; }
    .chip.tier-SR  { border-color: var(--tier-SR);  color: var(--tier-SR); }
    .chip.tier-SSR { border-color: var(--tier-SSR); color: #b06f00; box-shadow: 0 0 8px rgba(246,183,60,0.45); }
    .chip.tiny { font-size: 9.5px; padding: 1px 6px; border: none; }
    .new-tag {
      font-style: normal; font-size: 8.5px; font-weight: 900;
      background: #e0524d; color: #fff; border-radius: 999px;
      padding: 1px 5px; margin-left: 2px;
      animation: newPulse 1s ease infinite alternate;
    }
    @keyframes newPulse { to { transform: scale(1.15); } }

    /* ---- creature card ---------------------------------------------------- */
    .side-card {
      position: fixed; top: 50%; right: 18px; z-index: 12;
      width: 250px; max-height: 82vh; overflow-y: auto;
      transform: translate(calc(100% + 30px), -50%);
      transition: transform 0.35s cubic-bezier(0.2, 1.4, 0.4, 1);
      background: var(--glass);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-radius: 20px; padding: 18px;
      box-shadow: 0 10px 40px rgba(53,40,75,0.25), inset 0 1px 0 rgba(255,255,255,0.7);
      pointer-events: none;
    }
    .side-card.show { transform: translate(0, -50%); }
    /* flips to the left when the dragged squishling would hide behind it */
    .side-card.left { right: auto; left: 18px; transform: translate(calc(-100% - 30px), -50%); }
    .side-card.left.show { transform: translate(0, -50%); }
    .card-grade {
      position: absolute; top: 14px; right: 14px;
      font-size: 15px; font-weight: 900; letter-spacing: 0.5px;
      padding: 4px 12px; border-radius: 10px;
    }
    .side-card h3, .celebrate-card h3 { font-size: 21px; font-weight: 800; margin-bottom: 1px; }
    .card-sub { font-size: 11.5px; font-weight: 600; opacity: 0.55; margin-bottom: 10px; }
    .card-traits { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
    .card-stats { display: flex; flex-direction: column; gap: 5px; margin-bottom: 4px; }
    .stat { display: flex; align-items: center; justify-content: space-between; font-size: 12.5px; font-weight: 600; }
    .stat span:first-child { opacity: 0.6; }
    .stat b { font-weight: 800; }
    .stat .bar {
      position: static; transform: none; box-shadow: none; padding: 0;
      width: 110px; height: 8px; border-radius: 999px;
      background: rgba(53,40,75,0.12); overflow: hidden; backdrop-filter: none;
    }
    .stat .bar i { display: block; height: 100%; border-radius: 999px; background: linear-gradient(90deg, #7fc8a9, #4d9de0); }
    .card-lineage { margin-top: 10px; border-top: 1.5px dashed rgba(53,40,75,0.15); padding-top: 8px; }
    .card-lineage h4, .overlay-panel h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; margin-bottom: 6px; }

    /* ---- lineage tree ------------------------------------------------------ */
    .lin-node { font-size: 12.5px; font-weight: 600; }
    .lin-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
    .lin-dot {
      width: 13px; height: 13px; border-radius: 50% 50% 46% 54%; flex: none;
      border: 1.5px solid rgba(53,40,75,0.5);
      box-shadow: inset -2px -2px 3px rgba(53,40,75,0.25);
    }
    .lin-kids { margin-left: 6px; padding-left: 12px; border-left: 2px solid rgba(53,40,75,0.18); }
    .lin-tree {
      background: rgba(255,255,255,0.5); border-radius: 14px;
      padding: 12px 14px; margin-bottom: 10px;
    }

    /* ---- overlays ---------------------------------------------------------- */
    /* display rules would override [hidden] and leave invisible click-blockers */
    .overlay[hidden], #celebrate[hidden] { display: none; }
    .overlay {
      position: fixed; inset: 0; z-index: 30;
      background: rgba(53, 40, 75, 0.35);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.25s ease;
    }
    .overlay.show { opacity: 1; }
    .overlay-panel {
      width: min(680px, calc(100vw - 32px)); max-height: 84vh;
      background: var(--cream); border-radius: 24px;
      box-shadow: 0 24px 80px rgba(20, 10, 40, 0.45);
      display: flex; flex-direction: column; overflow: hidden;
      transform: translateY(14px) scale(0.97);
      transition: transform 0.25s cubic-bezier(0.2, 1.4, 0.4, 1);
    }
    .overlay.show .overlay-panel { transform: none; }
    .overlay-panel header {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 20px 12px;
      border-bottom: 1.5px solid rgba(53,40,75,0.1);
    }
    .overlay-panel h2 { font-size: 19px; font-weight: 800; flex: 1; }
    .overlay-panel header span { font-size: 12px; font-weight: 700; opacity: 0.5; }
    .overlay-panel .close {
      appearance: none; border: none; cursor: pointer;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(53,40,75,0.08); color: var(--ink);
      font-size: 18px; font-weight: 800;
    }
    .overlay-body { padding: 16px 20px 22px; overflow-y: auto; }
    .overlay-body section { margin-bottom: 16px; }
    .dex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    .dex-item {
      border-radius: 12px; padding: 9px 11px;
      background: rgba(255,255,255,0.7);
      display: flex; flex-direction: column; gap: 3px;
      font-size: 12.5px;
    }
    .dex-item b { font-weight: 800; }
    .dex-item .chip { align-self: flex-start; }
    .dex-item p { font-size: 10.5px; opacity: 0.55; font-weight: 600; }
    .dex-item.locked { opacity: 0.45; border: 2px dashed rgba(53,40,75,0.25); background: rgba(53,40,75,0.04); }
    .empty { opacity: 0.5; font-weight: 600; text-align: center; padding: 30px; }

    /* ---- settings ------------------------------------------------------------ */
    .overlay-panel.narrow { width: min(340px, calc(100vw - 32px)); }
    .settings-note { font-size: 12.5px; font-weight: 600; opacity: 0.6; margin-bottom: 14px; line-height: 1.5; }
    .danger {
      appearance: none; border: none; cursor: pointer;
      width: 100%; padding: 12px; border-radius: 14px;
      background: #e0524d; color: #fff;
      font-family: inherit; font-size: 14px; font-weight: 800;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    .danger:hover { background: #c9403b; }
    .danger:active { transform: scale(0.97); }
    .danger.confirm { background: #8c1f1b; animation: countFlash 0.4s ease; }

    /* ---- celebration -------------------------------------------------------- */
    /* card on the left, cinematic camera frames the newborn on the right */
    #celebrate {
      position: fixed; inset: 0; z-index: 40;
      display: flex; align-items: center; justify-content: flex-start;
      padding-left: 5vw;
      pointer-events: auto; cursor: pointer;
      opacity: 0; transition: opacity 0.3s ease;
    }
    @media (max-width: 700px) {
      #celebrate { justify-content: center; align-items: flex-end; padding: 0 0 90px; }
    }
    #celebrate.show { opacity: 1; }
    #celebrate.tier-glow-SSR { background: radial-gradient(ellipse at center, rgba(246,183,60,0.28), rgba(53,40,75,0.25) 70%); }
    #celebrate.tier-glow-SR  { background: radial-gradient(ellipse at center, rgba(155,93,229,0.22), rgba(53,40,75,0.22) 70%); }
    #celebrate.tier-glow-R, #celebrate.tier-glow-N { background: radial-gradient(ellipse at center, rgba(255,255,255,0.15), rgba(53,40,75,0.18) 70%); }
    .celebrate-card {
      position: relative;
      width: min(300px, calc(100vw - 60px));
      background: var(--cream); border-radius: 22px; padding: 20px;
      box-shadow: 0 30px 90px rgba(20, 10, 40, 0.5);
      animation: cardIn 0.55s cubic-bezier(0.2, 1.6, 0.35, 1);
    }
    @keyframes cardIn {
      0% { transform: scale(0.4) rotate(-6deg) translateY(60px); opacity: 0; }
      100% { transform: none; opacity: 1; }
    }
    .celebrate-banner {
      text-align: center; font-size: 12px; font-weight: 900;
      letter-spacing: 3px; opacity: 0.55; margin-bottom: 8px;
    }
    .celebrate-card .card-grade { animation: stampIn 0.5s cubic-bezier(0.3, 2, 0.4, 1) 0.25s backwards; }
    @keyframes stampIn {
      0% { transform: scale(3.2) rotate(14deg); opacity: 0; }
      100% { transform: none; opacity: 1; }
    }
    /* trait chips pop in one by one — rarer traits pop harder */
    .celebrate-card .chip.pop {
      opacity: 0;
      animation: chipPop 0.45s cubic-bezier(0.3, 1.8, 0.4, 1) both;
      animation-delay: var(--d, 0s);
    }
    @keyframes chipPop {
      0% { opacity: 0; transform: scale(0.2) translateY(10px); }
      60% { opacity: 1; transform: scale(1.16); }
      100% { opacity: 1; transform: none; }
    }
    .celebrate-card .chip.pop-UC { animation-duration: 0.5s; }
    .celebrate-card .chip.pop-SR { animation-name: chipPopSR; animation-duration: 0.62s; }
    @keyframes chipPopSR {
      0% { opacity: 0; transform: scale(0.15) rotate(-16deg); }
      55% { opacity: 1; transform: scale(1.4) rotate(5deg); box-shadow: 0 0 20px rgba(155,93,229,0.85); }
      100% { opacity: 1; transform: none; }
    }
    .celebrate-card .chip.pop-SSR { animation-name: chipPopSSR; animation-duration: 0.8s; }
    @keyframes chipPopSSR {
      0% { opacity: 0; transform: scale(0.1) rotate(-28deg); }
      45% { opacity: 1; transform: scale(1.8) rotate(7deg); filter: brightness(1.7) drop-shadow(0 0 14px #ffd76a); }
      68% { transform: scale(0.9) rotate(-3deg); }
      100% { opacity: 1; transform: none; filter: none; }
    }

    /* ---- toast ---------------------------------------------------------------- */
    #toast {
      position: fixed; top: 20px; left: 50%; transform: translate(-50%, -12px);
      z-index: 25; pointer-events: none;
      background: var(--ink); color: var(--cream);
      font-size: 13px; font-weight: 700;
      padding: 9px 18px; border-radius: 999px;
      box-shadow: 0 6px 24px rgba(53,40,75,0.4);
      opacity: 0; transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.2, 1.4, 0.4, 1);
    }
    #toast.show { opacity: 1; transform: translate(-50%, 0); }

    @media (max-width: 560px) {
      .title h1 { font-size: 21px; }
      .bar button { height: 40px; min-width: 40px; padding: 0 11px; font-size: 13px; }
      .hint { bottom: 80px; font-size: 11.5px; }
      .side-card { width: 210px; padding: 14px; right: 10px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="vignette"></div>
  <div id="hud">
    <div class="title">
      <h1>squishlings</h1>
      <p>merge · collect · grow</p>
    </div>
    <div class="hint" id="hint">taps fill the hatch meter 🥚 · throw same-size squishlings together to evolve!</div>
    <div class="bar">
      <button id="spawn-bar" title="hatch meter — clicks make it fill faster!">
        <div class="fill" id="spawn-fill"></div>
        <span class="egg">🥚</span>
        <span class="spawn-label">hatch</span>
      </button>
      <span class="count" id="count">5</span>
      <div class="divider"></div>
      <button id="btn-dex" title="Squishipedia — trait encyclopedia">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V4H6.5A2.5 2.5 0 0 0 4 6.5v13z"/>
          <path d="M4 19.5A2.5 2.5 0 0 0 6.5 22H20v-5"/>
        </svg>
      </button>
      <button id="btn-lineage" title="Lineage — family trees">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="5" r="2.6"/><circle cx="5.5" cy="18" r="2.6"/><circle cx="18.5" cy="18" r="2.6"/>
          <path d="M12 8v3.5M12 11.5L6.5 16M12 11.5l5.5 4.5"/>
        </svg>
      </button>
      <button id="btn-settings" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3.2"/>
          <path d="M12 2.8v3M12 18.2v3M2.8 12h3M18.2 12h3M5.2 5.2l2.1 2.1M16.7 16.7l2.1 2.1M18.8 5.2l-2.1 2.1M7.3 16.7l-2.1 2.1"/>
        </svg>
      </button>
    </div>
  </div>

  <aside id="card" class="side-card"></aside>
  <div id="toast"></div>
  <div id="celebrate" hidden></div>

  <div class="overlay" id="overlay-dex" hidden>
    <div class="overlay-panel">
      <header><h2>squishipedia</h2><span id="dex-progress"></span><button class="close" data-close>×</button></header>
      <div class="overlay-body" id="dex-body"></div>
    </div>
  </div>
  <div class="overlay" id="overlay-lineage" hidden>
    <div class="overlay-panel">
      <header><h2>lineages</h2><span>every squishling's family tree</span><button class="close" data-close>×</button></header>
      <div class="overlay-body" id="lineage-body"></div>
    </div>
  </div>
  <div class="overlay" id="overlay-settings" hidden>
    <div class="overlay-panel narrow">
      <header><h2>settings</h2><button class="close" data-close>×</button></header>
      <div class="overlay-body">
        <p class="settings-note">your squishlings, squishipedia and stage progress autosave to this browser.</p>
        <button id="btn-reset" class="danger">reset everything</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
